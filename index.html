<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Granted</title>
  <style>
    :root{
      --bg:#05060a;
      --neon:#00ffd5;
      --neon2:#7c4dff;
      --text:#d9fff6;
      --muted:#7af7e6;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 70% 30%, rgba(124,77,255,.18), transparent 55%),
                  radial-gradient(900px 600px at 30% 70%, rgba(0,255,213,.14), transparent 60%),
                  var(--bg);
      color:var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      overflow:hidden;
    }

    /* animated grid */
    .grid{
      position:fixed; inset:-40%;
      background:
        linear-gradient(rgba(0,255,213,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,213,.08) 1px, transparent 1px);
      background-size: 48px 48px;
      transform: rotateX(70deg) rotateZ(25deg);
      filter: drop-shadow(0 0 18px rgba(0,255,213,.18));
      animation: drift 18s linear infinite;
      opacity:.35;
      pointer-events:none;
    }
    @keyframes drift{
      from{background-position: 0 0, 0 0}
      to{background-position: 0 900px, 900px 0}
    }

    /* floating particles */
    .particles{position:fixed; inset:0; pointer-events:none; opacity:.55}
    .p{
      position:absolute;
      width:3px; height:3px;
      background: var(--neon);
      border-radius:50%;
      box-shadow: 0 0 12px rgba(0,255,213,.8);
      animation: float var(--t) linear infinite;
      opacity: var(--o);
    }
    @keyframes float{
      from{ transform: translateY(120vh) translateX(var(--x)) }
      to{ transform: translateY(-20vh) translateX(calc(var(--x) + 60px)) }
    }

    /* center card */
    .wrap{
      position:relative;
      height:100%;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      width:min(820px, 95vw);
      border:1px solid rgba(0,255,213,.25);
      border-radius:18px;
      background: rgba(8,10,16,.55);
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(124,77,255,.14) inset,
        0 24px 80px rgba(0,0,0,.55),
        0 0 40px rgba(0,255,213,.12);
      overflow:hidden;
      position:relative;
    }
    .scanline{
      position:absolute; inset:0;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(0,255,213,.09) 50%,
        transparent 100%);
      transform: translateY(-120%);
      animation: scan 5.5s ease-in-out infinite;
      mix-blend-mode: screen;
      pointer-events:none;
    }
    @keyframes scan{
      0%{transform:translateY(-120%)}
      55%{transform:translateY(120%)}
      100%{transform:translateY(120%)}
    }

    .top{
      display:flex;
      gap:10px;
      padding:14px 16px;
      align-items:center;
      border-bottom:1px solid rgba(0,255,213,.18);
      background: rgba(0,0,0,.18);
    }
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.red{background:#ff4d6d}
    .dot.yellow{background:#ffd166}
    .dot.green{background:#06d6a0}
    .title{
      margin-left:8px;
      font-size:12px;
      letter-spacing:.14em;
      color:rgba(217,255,246,.8);
      text-transform:uppercase;
    }

    .content{padding:26px 22px 30px}
    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(124,77,255,.35);
      background: rgba(124,77,255,.12);
      color: rgba(217,255,246,.9);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .badge i{
      width:8px;height:8px;border-radius:50%;
      background: var(--neon);
      box-shadow: 0 0 14px rgba(0,255,213,.9);
      display:inline-block;
    }

    h1{
      margin:14px 0 10px;
      font-size: clamp(34px, 5vw, 62px);
      line-height:1.05;
      letter-spacing:.02em;
      text-shadow:
        0 0 18px rgba(0,255,213,.20),
        0 0 30px rgba(124,77,255,.18);
    }

    .typing{
      display:inline-block;
      border-right: 2px solid rgba(0,255,213,.9);
      padding-right:6px;
      animation: blink 1s steps(1,end) infinite;
    }
    @keyframes blink{50%{border-color:transparent}}

    .sub{
      color: rgba(122,247,230,.75);
      font-size: 14px;
      line-height:1.6;
      max-width: 70ch;
      margin: 0 0 18px;
    }

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:10px;
    }
    button{
      cursor:pointer;
      border:1px solid rgba(0,255,213,.35);
      background: rgba(0,255,213,.10);
      color: rgba(217,255,246,.95);
      padding:10px 14px;
      border-radius:12px;
      font-family: inherit;
      letter-spacing:.06em;
      transition: transform .08s ease, box-shadow .2s ease, background .2s ease;
    }
    button:hover{
      background: rgba(0,255,213,.16);
      box-shadow: 0 0 24px rgba(0,255,213,.16);
      transform: translateY(-1px);
    }
    .secondary{
      border-color: rgba(124,77,255,.45);
      background: rgba(124,77,255,.12);
    }
    .secondary:hover{
      background: rgba(124,77,255,.18);
      box-shadow: 0 0 26px rgba(124,77,255,.16);
    }

    .footer{
      margin-top:18px;
      font-size:12px;
      color: rgba(217,255,246,.55);
      letter-spacing:.08em;
    }

    /* mobile */
    @media (max-width:520px){
      .sub{max-width:unset}
      .content{padding:22px 18px 26px}
    }
  </style>
</head>
<body>
  <div class="grid"></div>

  <div class="particles" id="particles"></div>

  <div class="wrap">
    <div class="card">
      <div class="scanline"></div>
      <div class="top">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="title">secure-channel / confession.exe</span>
      </div>

      <div class="content">
        <span class="badge"><i></i> ACCESS GRANTED</span>

        <h1><span id="msg" class="typing"></span></h1>

        <p class="sub">
          Signal detected. Connection stabilized. This message is encrypted with one key:
          <b>you</b>.
        </p>

        <div class="btns">
  <button onclick="glitch()">GLITCH</button>
  <button class="secondary" onclick="retype()">RETYPE</button>
  <button onclick="playMusic()">CLICK HERE</button>
</div>
          <button onclick="glitch()">GLITCH</button>
          <button class="secondary" onclick="retype()">RETYPE</button>
        </div>

        <div class="footer" id="stamp"></div>
      </div>
    </div>
  </div>

  <script>
    // ✅ Change these two lines to whatever you want:
    const NAME = "RANIA";
    const TEXT = `KAT3SBINI BZAF, ${NAME} ANCHDEK AN9TLK CHI NHAR ❤️`;

    // typing effect
    const msgEl = document.getElementById("msg");
    let i = 0, timer = null;

    function type() {
      msgEl.textContent = "";
      i = 0;
      clearInterval(timer);
      timer = setInterval(() => {
        msgEl.textContent = TEXT.slice(0, i++);
        if (i > TEXT.length) clearInterval(timer);
      }, 85);
    }
    type();

    // timestamp footer
    const stamp = document.getElementById("stamp");
    stamp.textContent = "timestamp: " + new Date().toLocaleString();

    // particles
    const container = document.getElementById("particles");
    const count = 70;
    for (let n=0;n<count;n++){
      const d = document.createElement("div");
      d.className = "p";
      d.style.left = Math.random()*100 + "vw";
      d.style.setProperty("--x", (Math.random()*120 - 60) + "px");
      d.style.setProperty("--t", (10 + Math.random()*18) + "s");
      d.style.setProperty("--o", (0.25 + Math.random()*0.65));
      container.appendChild(d);
    }

    // fun effects
    function glitch(){
      const original = msgEl.textContent;
      const chars = "01#$%&@*+!?";
      let t = 0;
      const g = setInterval(()=>{
        t++;
        msgEl.textContent = original.split("").map((c,idx)=>{
          if (Math.random() < 0.22) return chars[Math.floor(Math.random()*chars.length)];
          return c;
        }).join("");
        if(t>10){ clearInterval(g); msgEl.textContent = original; }
      }, 60);
    }

    function retype(){ type(); }
    // 🎵 Music Player
const audio = new Audio("https://YOUR_AUDIO_LINK.mp3");

function playMusic() {
  audio.play();
}
  </script>
 function playMusic() {
  document.getElementById("ytplayer").src =
    "https://www.youtube.com/embed/jbR7YDdeMfY?autoplay=1";
}
}
</body>
  <div id="player" style="display:none;">
  <iframe
    id="ytplayer"
    width="0"
    height="0"
    frameborder="0"
    allow="autoplay"
  ></iframe>
</div>
</html>
