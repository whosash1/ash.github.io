<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASH - CHANNEL</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root{
    --bg0:#05060a;
    --bg1:#07131a;
    --neon:#00f7ff;
    --neon2:#00ffa6;
    --text:#dffcff;
    --muted:#8fb7c2;
    --glass:rgba(14,20,26,.72);
    --line:rgba(0,247,255,.35);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family:"Share Tech Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    color:var(--text);
    background: radial-gradient(1200px 700px at 50% 40%, #0a2a33 0%, var(--bg1) 40%, var(--bg0) 100%);
    overflow:hidden;
  }

  /* --- STARFIELD LAYERS --- */
  .stars, .stars2, .stars3{
    position:fixed; inset:0;
    background-repeat:repeat;
    pointer-events:none;
    opacity:.55;
    transform: translateZ(0);
  }
  .stars{
    background-image:
      radial-gradient(1px 1px at 10px 20px, rgba(255,255,255,.9) 50%, transparent 52%),
      radial-gradient(1px 1px at 80px 120px, rgba(255,255,255,.8) 50%, transparent 52%),
      radial-gradient(1px 1px at 200px 60px, rgba(255,255,255,.7) 50%, transparent 52%),
      radial-gradient(1px 1px at 320px 240px, rgba(255,255,255,.6) 50%, transparent 52%);
    background-size: 420px 320px;
    animation: drift 30s linear infinite;
  }
  .stars2{
    opacity:.35;
    filter: blur(.2px);
    background-image:
      radial-gradient(1px 1px at 40px 70px, rgba(0,247,255,.9) 50%, transparent 52%),
      radial-gradient(1px 1px at 260px 160px, rgba(0,255,166,.8) 50%, transparent 52%),
      radial-gradient(1px 1px at 120px 260px, rgba(255,255,255,.7) 50%, transparent 52%);
    background-size: 360px 340px;
    animation: drift 55s linear infinite reverse;
  }
  .stars3{
    opacity:.18;
    background-image:
      radial-gradient(2px 2px at 150px 90px, rgba(255,255,255,.8) 50%, transparent 52%),
      radial-gradient(2px 2px at 320px 190px, rgba(0,247,255,.7) 50%, transparent 52%);
    background-size: 520px 420px;
    animation: drift 85s linear infinite;
  }

  @keyframes drift{
    from{ transform: translate3d(0,0,0); }
    to{ transform: translate3d(-420px, -320px, 0); }
  }

  /* --- MATRIX CANVAS --- */
  #matrix{
    position:fixed; inset:0;
    opacity:.22;
    pointer-events:none;
    mix-blend-mode: screen;
  }

  /* --- CENTER LAYOUT --- */
  .wrap{
    position:relative;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  /* --- GLOW ORB --- */
  .orb{
    position:absolute;
    width:900px; height:900px;
    border-radius:50%;
    background: radial-gradient(circle at 40% 40%, rgba(0,247,255,.14), transparent 55%),
                radial-gradient(circle at 60% 60%, rgba(0,255,166,.10), transparent 60%);
    filter: blur(0.5px);
    animation: orb 8s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes orb{
    from{ transform: translate(-40px,-30px) scale(1); }
    to{ transform: translate(30px,20px) scale(1.03); }
  }

  /* --- TERMINAL CARD --- */
  .card{
    width:min(860px, 95vw);
    border-radius:18px;
    background: var(--glass);
    border: 1px solid var(--line);
    box-shadow:
      0 0 0 1px rgba(0,247,255,.10) inset,
      0 20px 60px rgba(0,0,0,.55),
      0 0 40px rgba(0,247,255,.20);
    backdrop-filter: blur(10px);
    overflow:hidden;
    position:relative;
  }

  /* scanline */
  .card::after{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.03),
      rgba(255,255,255,.03) 1px,
      transparent 2px,
      transparent 6px
    );
    opacity:.18;
    pointer-events:none;
  }

  .topbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
    border-bottom:1px solid rgba(0,247,255,.18);
  }
  .dot{ width:12px; height:12px; border-radius:50%; }
  .red{ background:#ff5f56; }
  .yellow{ background:#ffbd2e; }
  .green{ background:#27c93f; }

  .title{
    margin-left:10px;
    font-weight:700;
    color:var(--neon);
    letter-spacing:.8px;
    text-shadow: 0 0 10px rgba(0,247,255,.35);
  }
  .subtitle{
    margin-left:auto;
    font-size:13px;
    color:#9bd7e2;
    opacity:.9;
  }

  .content{ padding:26px 26px 18px; }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 14px;
    border-radius:999px;
    border:1px solid rgba(0,247,255,.55);
    background: rgba(0,247,255,.10);
    box-shadow: 0 0 18px rgba(0,247,255,.12);
    margin-bottom:18px;
  }
  .pulse{
    width:10px; height:10px; border-radius:50%;
    background: var(--neon2);
    box-shadow: 0 0 10px rgba(0,255,166,.7);
    animation:pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); opacity:1;}
    50%{ transform:scale(1.6); opacity:.55;}
  }

  /* typing area */
  .big{
    margin: 10px 0 10px;
    font-size: clamp(30px, 4.4vw, 54px);
    line-height: 1.05;
    text-align:center;
    color:#f4ffff;
    text-shadow:
      0 0 18px rgba(0,247,255,.24),
      0 0 2px rgba(255,255,255,.35);
    letter-spacing: 1px;
    min-height: 2.2em;
  }

  .subtext{
    margin: 10px auto 18px;
    max-width: 62ch;
    text-align:center;
    color: var(--muted);
    font-size: 15px;
    line-height:1.5;
  }

  .btnRow{
    display:flex;
    justify-content:center;
    margin: 18px 0 10px;
  }

  .btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding: 13px 26px;
    font-size: 17px;
    border:0;
    border-radius: 12px;
    cursor:pointer;
    color:#001012;
    font-weight:800;
    letter-spacing:.6px;
    background: linear-gradient(45deg, var(--neon), var(--neon2));
    box-shadow:
      0 10px 30px rgba(0,247,255,.18),
      0 0 0 1px rgba(255,255,255,.18) inset;
    transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    user-select:none;
  }
  .btn:hover{
    transform: translateY(-1px) scale(1.03);
    box-shadow:
      0 14px 40px rgba(0,247,255,.25),
      0 0 25px rgba(0,255,166,.20),
      0 0 0 1px rgba(255,255,255,.22) inset;
    filter:saturate(1.05);
  }
  .btn:active{ transform: translateY(0) scale(0.99); }

  .btn .chip{
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0,0,0,.22);
    color: rgba(255,255,255,.9);
    border: 1px solid rgba(255,255,255,.18);
  }

  .footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding: 12px 18px 14px;
    border-top: 1px solid rgba(0,247,255,.18);
    color: rgba(160,210,220,.75);
    font-size: 12px;
  }

  /* hearts */
  .heart{
    position:fixed;
    font-size: 18px;
    will-change: transform, opacity;
    pointer-events:none;
    filter: drop-shadow(0 0 6px rgba(255,60,160,.35));
    animation: floatUp 2.2s ease-out forwards;
  }
  @keyframes floatUp{
    from{ transform: translate3d(0,0,0) scale(1); opacity: 0; }
    10%{ opacity: 1; }
    to{ transform: translate3d(0,-180px,0) scale(1.25) rotate(10deg); opacity: 0; }
  }

  /* small hint */
  .hint{
    opacity:.65;
    font-size:12px;
    text-align:center;
    margin-top:6px;
  }

  /* hidden youtube player */
  #yt{
    position:absolute;
    left:-9999px;
    top:-9999px;
    width:1px; height:1px;
    overflow:hidden;
  }
</style>
</head>

<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>
  <canvas id="matrix"></canvas>

  <div class="wrap">
    <div class="orb"></div>

    <div class="card" role="region" aria-label="ASH - CHANNEL">
      <div class="topbar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>

        <div class="title">ASH - CHANNEL</div>
        <div class="subtitle">dw this website is safe</div>
      </div>

      <div class="content">
        <div class="badge"><span class="pulse"></span> Hello</div>

        <div class="big" id="typed"></div>

        <div class="subtext">
          Signal detected. Connection stabilized. This message is encrypted with one key: <b>you</b>.
        </div>

        <div class="btnRow">
          <button class="btn" id="playBtn">
            CLICK HERE <span class="chip" id="chip">ARM</span>
          </button>
        </div>

        <div class="hint" id="status">waiting for user action…</div>
      </div>

      <div class="footer">
        <div>timestamp: <span id="time"></span></div>
        <div>secure link: <span style="color:rgba(0,255,166,.85)">ACTIVE</span></div>
      </div>
    </div>
  </div>

  <!-- YouTube player container -->
  <div id="yt"></div>

<script>
/* =========================
   1) YOUR MESSAGE (typing)
========================= */
const MESSAGE =
  "KAT3SBINI BZAF, RANIA ANCHDEK AN9TLK CHI NHAR ❤️";

function typeText(el, text, speed=32){
  el.textContent = "";
  let i = 0;
  const timer = setInterval(() => {
    el.textContent += text[i++];
    if(i >= text.length) clearInterval(timer);
  }, speed);
}
typeText(document.getElementById("typed"), MESSAGE, 28);

/* =========================
   2) TIMESTAMP
========================= */
document.getElementById("time").textContent = new Date().toLocaleString();

/* =========================
   3) MATRIX RAIN
========================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
let w, h, cols, drops;
const letters = "アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ASHRANIA♥";

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  cols = Math.floor(w / 16);
  drops = Array(cols).fill(1);
}
window.addEventListener("resize", resize);
resize();

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0, 0, w, h);

  ctx.font = "16px Share Tech Mono";
  for(let i=0; i<drops.length; i++){
    const text = letters[Math.floor(Math.random() * letters.length)];
    const x = i * 16;
    const y = drops[i] * 16;

    ctx.fillStyle = "rgba(0,247,255,0.55)";
    ctx.fillText(text, x, y);

    if(y > h && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
  requestAnimationFrame(drawMatrix);
}
drawMatrix();

/* =========================
   4) HEARTS
========================= */
function spawnHearts(count=10){
  for(let i=0;i<count;i++){
    const h = document.createElement("div");
    h.className = "heart";
    h.textContent = Math.random() > 0.3 ? "❤️" : "💚";
    const x = (window.innerWidth * 0.5) + (Math.random()*160 - 80);
    const y = (window.innerHeight * 0.62) + (Math.random()*40 - 20);
    h.style.left = x + "px";
    h.style.top  = y + "px";
    h.style.fontSize = (14 + Math.random()*18) + "px";
    h.style.transform = `translate3d(${Math.random()*12-6}px,0,0) rotate(${Math.random()*20-10}deg)`;
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 2300);
  }
}

/* =========================
   5) YOUTUBE PLAYER (real play)
   - Autoplay must be user-clicked
========================= */
const VIDEO_ID = "jbR7YDdeMfY"; // your link

let player;
let ytReady = false;

function loadYT(){
  return new Promise((resolve) => {
    if(window.YT && window.YT.Player) return resolve();
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    window.onYouTubeIframeAPIReady = () => resolve();
    document.head.appendChild(tag);
  });
}

async function initPlayer(){
  await loadYT();
  player = new YT.Player("yt", {
    height: "1",
    width: "1",
    videoId: VIDEO_ID,
    playerVars: {
      autoplay: 0,
      controls: 0,
      modestbranding: 1,
      rel: 0,
      playsinline: 1
    },
    events: {
      onReady: () => { ytReady = true; }
    }
  });
}

initPlayer();

/* =========================
   6) BUTTON ACTION
========================= */
const btn = document.getElementById("playBtn");
const chip = document.getElementById("chip");
const status = document.getElementById("status");

let armed = false;

btn.addEventListener("click", async () => {
  spawnHearts(14);

  // first click: arm + play
  if(!armed){
    armed = true;
    chip.textContent = "LIVE";
    status.textContent = "connecting… (music starting)";
    btn.textContent = "PLAYING ❤️";
    btn.appendChild(chip);

    // ensure player is ready
    if(!ytReady){
      status.textContent = "loading secure audio channel…";
      await new Promise(r => setTimeout(r, 500));
    }

    try{
      player.playVideo();
      status.textContent = "secure channel established ✅";
    }catch(e){
      // if browser blocks, user can click again
      status.textContent = "tap again if audio didn’t start 🔊";
      btn.textContent = "CLICK AGAIN 🔊";
      btn.appendChild(chip);
    }
    return;
  }

  // next clicks: toggle play/pause
  try{
    const state = player.getPlayerState(); // 1 playing, 2 paused
    if(state === 1){
      player.pauseVideo();
      status.textContent = "paused ⏸️";
      btn.textContent = "RESUME 🔊";
      btn.appendChild(chip);
    }else{
      player.playVideo();
      status.textContent = "playing ✅";
      btn.textContent = "PLAYING ❤️";
      btn.appendChild(chip);
      spawnHearts(10);
    }
  }catch(e){
    status.textContent = "tap again 🔊";
  }
});
</script>
</body>
</html>
