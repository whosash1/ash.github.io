<!DOCTYPE html>
<html>
<head>
<title>Access Granted</title>
<style>
body {
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    text-align: center;
    margin-top: 20%;
}
.cursor {
    border-right: 2px solid #00ff00;
    animation: blink 1s infinite;
}
@keyframes blink {
    50% { border-color: transparent; }
}
</style>
</head>
<body>

<h1 id="text"></h1>

<script>
let message = "I LOVE YOU RANIA ❤️";
let i = 0;
let speed = 100;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}
typeWriter();
</script>

</body>
</html>
